# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Air M1"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 8                                    # Available RAM in GB
  python_version: "3.11.4"                      # python --version
  os: "macOS 26.3"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: true               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: approx. 7-12                # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "ChatGPT"        # e.g. for architecture discussion, code review
  - "Antigravity"  # e.g. for autocomplete
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "Other", "None"

ai_usage_summary: |
  AI assistants were utilized strictly as auxiliary tools for syntax autocomplete,
  boilerplate generation,
  and debugging minor Python environment or Docker issues.
  The core engineering work—encompassing the two-stage retrieval architecture, 
  semantic index design, pipeline optimization, and ranking logic—was entirely human-designed and implemented.
  No candidate data was ever fed into any LLMs or external APIs.


# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Implemented a highly optimized, two-stage ranking pipeline on CPU. 
  The architecture begins with a multi-format ingestion engine that efficiently parses and validates candidate data. 
  Beyond semantic search, the system integrates dedicated modules to evaluate explicit candidate signals like experience years, 
  skill overlaps, and job titles. 
  This is paired with a built-in risk engine that factors in availability and notice periods to intelligently adjust final scores.
  Stage 1 uses precomputed dense vector embeddings and a fast semantic index to perform scalable initial retrieval,
  rapidly filtering ~70,000 candidates down to a high-quality top 500 in under 70 seconds. 
  Stage 2 applies a state-of-the-art Cross-Encoder model to rigorously re-rank this shortlist by capturing deep contextual interactions with the job description. 
  Finally, a dedicated reasoning module dynamically generates human-readable justifications. 
  The entire end-to-end system executes locally in under three minutes, ensuring strict data privacy without relying on external API bottlenecks.

